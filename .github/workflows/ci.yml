name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: core ${{ matrix.platform }} (${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # one artifact-publishing build per platform...
          - os: windows-latest
            platform: windows-x64
            cc: msvc
            artifact: true
          - os: ubuntu-latest
            platform: linux-x64
            cc: gcc
            artifact: true
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            cc: gcc
            artifact: true
          - os: macos-latest
            platform: macos-arm64
            cc: clang
            artifact: true
            osx_target: '11.0'   # keeps the published wheel's macosx_11_0 tag honest
          - os: macos-15-intel   # last Intel runner GitHub offers (macos-13 is retired)
            platform: macos-x64
            cc: clang
            artifact: true
            osx_target: '10.15'
          # ...plus compiler cross-checks (test only, no artifact)
          - os: ubuntu-latest
            platform: linux-x64
            cc: clang
            artifact: false
          # sanitizer leg: UBSan trips signed-shift/aliasing UB on the first
          # verify; ASan catches parser OOB. Warnings are errors here.
          - os: ubuntu-latest
            platform: linux-x64-asan-ubsan
            cc: clang
            artifact: false
            sanitize: address,undefined
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.cc }}" != "msvc" ]; then
            export CC=${{ matrix.cc }}
          fi
          EXTRA=""
          if [ -n "${{ matrix.sanitize }}" ]; then
            export CFLAGS="-fsanitize=${{ matrix.sanitize }} -fno-sanitize-recover=all -fno-omit-frame-pointer -g -O1"
            export LDFLAGS="-fsanitize=${{ matrix.sanitize }}"
            EXTRA="-DHLM_WERROR=ON"
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release $EXTRA \
            ${{ matrix.osx_target && format('-DCMAKE_OSX_DEPLOYMENT_TARGET={0}', matrix.osx_target) || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package artifact
        if: matrix.artifact
        shell: bash
        run: |
          mkdir -p dist/include
          cp -r include/hymma dist/include/
          cp LICENSE README.md dist/
          # hymmalm.lib is the DLL import library; hymmalm_static.lib the static lib
          find build -maxdepth 2 \( -name 'hymmalm.dll' -o -name 'libhymmalm.so' \
            -o -name 'libhymmalm.dylib' -o -name 'libhymmalm.a' -o -name 'hymmalm.lib' \
            -o -name 'hymmalm_static.lib' \) \
            -exec cp {} dist/ \;

      - uses: actions/upload-artifact@v4
        if: matrix.artifact
        with:
          name: licMngm-core-${{ matrix.platform }}
          path: dist/

  wrappers:
    name: ${{ matrix.wrapper }} wrapper (linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wrapper: [python, node, go, java, php, rust]
    steps:
      - uses: actions/checkout@v4

      - name: Build native library
        # the Rust crate and Go module vendor + compile the core themselves
        if: matrix.wrapper != 'rust' && matrix.wrapper != 'go'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Python tests
        if: matrix.wrapper == 'python'
        working-directory: wrappers/python
        run: HYMMALM_LIB=$PWD/../../build/libhymmalm.so python3 -m unittest discover -s tests -v

      - uses: actions/setup-node@v4
        if: matrix.wrapper == 'node'
        with:
          node-version: '22'
      - name: Node tests
        if: matrix.wrapper == 'node'
        working-directory: wrappers/node
        run: |
          npm install
          HYMMALM_LIB=$PWD/../../build/libhymmalm.so npm test

      - uses: actions/setup-go@v5
        if: matrix.wrapper == 'go'
        with:
          go-version: 'stable'
      - name: Go tests
        if: matrix.wrapper == 'go'
        working-directory: wrappers/go
        run: |
          ./sync-csrc.sh
          git diff --exit-code .   # vendored C copies must match ../../src
          go vet ./...
          go test ./... -v

      - uses: actions/setup-java@v4
        if: matrix.wrapper == 'java'
        with:
          distribution: temurin
          java-version: '21'
      - name: Java tests
        if: matrix.wrapper == 'java'
        working-directory: wrappers/java
        run: ./run-tests.sh

      - uses: shivammathur/setup-php@v2
        if: matrix.wrapper == 'php'
        with:
          php-version: '8.3'
          extensions: ffi
          ini-values: ffi.enable=true
      - name: PHP tests
        if: matrix.wrapper == 'php'
        working-directory: wrappers/php
        run: HYMMALM_LIB=$PWD/../../build/libhymmalm.so php tests/run.php

      - name: Rust tests
        if: matrix.wrapper == 'rust'
        working-directory: wrappers/rust
        run: |
          ./sync-csrc.sh
          git diff --exit-code .   # vendored C copies must match ../../src
          cargo test
          cargo package            # prove the publishable tarball builds standalone

  wrappers-windows:
    # the vendored go/rust builds compile hlm_port_win.c / hlm_crypto_cng.c
    # under their own toolchains (mingw cgo, MSVC cc-rs) — the linux wrapper
    # job only proves text parity of the copies, not that they build.
    name: ${{ matrix.wrapper }} wrapper (windows compile)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        wrapper: [go, rust]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: matrix.wrapper == 'go'
        with:
          go-version: 'stable'
      - name: Go build
        if: matrix.wrapper == 'go'
        working-directory: wrappers/go
        shell: bash
        run: |
          go vet ./...
          go build ./...

      - name: Rust build
        if: matrix.wrapper == 'rust'
        working-directory: wrappers/rust
        shell: bash
        run: cargo build --tests

  dotnet-wrapper:
    name: .NET wrapper (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build native library
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run wrapper demo over the test vectors
        shell: bash
        run: |
          # the demo P/Invokes hymmalm.dll and verifies every signed vector
          if [ -f build/Release/hymmalm.dll ]; then cp build/Release/hymmalm.dll build/; fi
          cd wrappers/dotnet/LicenseManagement.Core.Demo
          dotnet run -c Release -- ../../../tests/vectors/vectors.json

  crates:
    name: publish hymmalm to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, wrappers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish
        working-directory: wrappers/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # version comes from the release tag, like the NuGet job
          sed -i "s/^version = \".*\"/version = \"${GITHUB_REF_NAME#v}\"/" Cargo.toml
          cargo publish --allow-dirty

  pypi:
    name: publish hymmalm to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, wrappers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble platform wheels + sdist
        working-directory: wrappers/python
        run: |
          pip install build wheel setuptools auditwheel patchelf twine
          sed -i "s/^version = \".*\"/version = \"${GITHUB_REF_NAME#v}\"/" pyproject.toml

          # pure sdist first (no native library inside)
          python -m build --sdist -o dist/upload

          # one py3-none-<platform> wheel per native artifact
          while read -r plat tag lib audit; do
            rm -rf build   # setuptools' build dir caches package data across runs
            rm -f hymmalm/*.so hymmalm/*.dylib hymmalm/*.dll
            cp "../../artifacts/licMngm-core-$plat/$lib" hymmalm/
            python setup.py -q bdist_wheel --plat-name "$tag"
            if [ "$audit" = "audit" ]; then
              # verifies only whitelisted system libs are linked and computes
              # the real manylinux floor (cross-arch safe: pure ELF analysis)
              auditwheel repair dist/hymmalm-*-"$tag".whl -w dist/upload
              rm dist/hymmalm-*-"$tag".whl
            else
              mv dist/hymmalm-*-"$tag".whl dist/upload/
            fi
          done <<'PLATFORMS'
          linux-x64 linux_x86_64 libhymmalm.so audit
          linux-arm64 linux_aarch64 libhymmalm.so audit
          macos-arm64 macosx_11_0_arm64 libhymmalm.dylib -
          macos-x64 macosx_10_15_x86_64 libhymmalm.dylib -
          windows-x64 win_amd64 hymmalm.dll -
          PLATFORMS
          ls -l dist/upload

      - name: Upload to PyPI
        working-directory: wrappers/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/upload/*

  npm:
    name: publish hymmalm to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, wrappers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Bundle per-platform native libraries
        working-directory: wrappers/node
        run: |
          while read -r plat dir lib; do
            mkdir -p "prebuilt/$dir"
            cp "../../artifacts/licMngm-core-$plat/$lib" "prebuilt/$dir/"
          done <<'PLATFORMS'
          linux-x64 linux-x64 libhymmalm.so
          linux-arm64 linux-arm64 libhymmalm.so
          macos-arm64 darwin-arm64 libhymmalm.dylib
          macos-x64 darwin-x64 libhymmalm.dylib
          windows-x64 win32-x64 hymmalm.dll
          PLATFORMS

      - name: Publish
        working-directory: wrappers/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
          npm publish --access public

  maven:
    name: publish hymmalm to Maven Central
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, wrappers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Bundle per-platform native libraries
        working-directory: wrappers/java
        run: |
          while read -r plat dir lib; do
            mkdir -p "src/main/resources/native/$dir"
            cp "../../artifacts/licMngm-core-$plat/$lib" "src/main/resources/native/$dir/"
          done <<'PLATFORMS'
          linux-x64 linux-x64 libhymmalm.so
          linux-arm64 linux-arm64 libhymmalm.so
          macos-arm64 macos-arm64 libhymmalm.dylib
          macos-x64 macos-x64 libhymmalm.dylib
          windows-x64 windows-x64 hymmalm.dll
          PLATFORMS

      - name: Publish
        working-directory: wrappers/java
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn -q -B versions:set -DnewVersion="${GITHUB_REF_NAME#v}"
          mvn -B -Prelease deploy

  nuget:
    name: publish LicenseManagement.Core to NuGet
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, dotnet-wrapper]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Arrange native runtimes
        run: |
          W=wrappers/dotnet/LicenseManagement.Core/runtimes
          mkdir -p "$W/win-x64/native" "$W/linux-x64/native" "$W/linux-arm64/native" "$W/osx-arm64/native" "$W/osx-x64/native"
          cp artifacts/licMngm-core-windows-x64/hymmalm.dll "$W/win-x64/native/"
          cp artifacts/licMngm-core-linux-x64/libhymmalm.so "$W/linux-x64/native/"
          cp artifacts/licMngm-core-linux-arm64/libhymmalm.so "$W/linux-arm64/native/"
          cp artifacts/licMngm-core-macos-arm64/libhymmalm.dylib "$W/osx-arm64/native/"
          cp artifacts/licMngm-core-macos-x64/libhymmalm.dylib "$W/osx-x64/native/"

      - name: Pack
        run: dotnet pack wrappers/dotnet/LicenseManagement.Core/LicenseManagement.Core.csproj -c Release -p:Version="${GITHUB_REF_NAME#v}" -o nupkg

      - name: Push to NuGet
        run: dotnet nuget push "nupkg/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  release:
    name: publish release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, dotnet-wrapper]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip per-platform bundles
        run: |
          cd artifacts
          for d in licMngm-core-*; do
            (cd "$d" && zip -r "../${d/core-/core-${GITHUB_REF_NAME}-}.zip" .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
